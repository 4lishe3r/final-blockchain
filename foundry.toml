[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 128 }
fs_permissions = [{ access = "read-write", path = "./coverage" }]

[profile.ci]
fuzz = { runs = 5000 }
invariant = { runs = 512, depth = 256 }

[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"
base_sepolia     = "${BASE_SEPOLIA_RPC_URL}"
mainnet          = "${MAINNET_RPC_URL}"

[etherscan]
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", url = "https://api-sepolia.arbiscan.io/api" }
base_sepolia     = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }