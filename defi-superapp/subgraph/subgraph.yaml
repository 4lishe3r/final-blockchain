specVersion: 0.0.5
schema:
  file: ./schema.graphql

dataSources:
  # ── ConstantProductAMM ────────────────────────────────────────────────────
  - kind: ethereum
    name: ConstantProductAMM
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"  # UPDATE after deploy
      abi: ConstantProductAMM
      startBlock: 0                                           # UPDATE after deploy
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
        - Swap
        - LiquidityEvent
        - ProtocolStats
      abis:
        - name: ConstantProductAMM
          file: ../out/ConstantProductAMM.sol/ConstantProductAMM.json
      eventHandlers:
        - event: Swap(indexed address,indexed address,uint256,uint256,indexed address)
          handler: handleSwap
        - event: LiquidityAdded(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityRemoved
        - event: ReservesUpdated(uint256,uint256)
          handler: handleReservesUpdated
      file: ./src/amm.ts

  # ── DeFiGovernor ──────────────────────────────────────────────────────────
  - kind: ethereum
    name: DeFiGovernor
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"  # UPDATE after deploy
      abi: DeFiGovernor
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Proposal
        - Vote
        - ProtocolStats
      abis:
        - name: DeFiGovernor
          file: ../out/DeFiGovernor.sol/DeFiGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
        - event: ProposalQueued(uint256,uint256)
          handler: handleProposalQueued
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
        - event: ProposalCanceled(uint256)
          handler: handleProposalCanceled
      file: ./src/governor.ts

  # ── YieldVault ────────────────────────────────────────────────────────────
  - kind: ethereum
    name: YieldVault
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"  # UPDATE after deploy
      abi: YieldVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VaultSnapshot
      abis:
        - name: YieldVault
          file: ../out/YieldVault.sol/YieldVault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleVaultDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleVaultWithdraw
      file: ./src/vault.ts
