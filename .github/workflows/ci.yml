name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FOUNDRY_PROFILE: ci

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1

      - name: Install Node (for solhint + prettier)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: forge fmt check
        run: forge fmt --check

      - name: solhint
        run: npx solhint 'src/**/*.sol'

      - name: prettier (frontend)
        run: npx prettier --check 'frontend/src/**/*.{ts,tsx,js,jsx}'

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1

      - name: Build
        run: forge build --sizes

      - name: Run tests
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
          ARBITRUM_SEPOLIA_RPC_URL: ${{ secrets.ARBITRUM_SEPOLIA_RPC_URL }}
        run: forge test -vvv

      - name: Coverage report
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
        run: |
          forge coverage --report lcov --report markdown > coverage/coverage.md
          cat coverage/coverage.md

      - name: Check coverage threshold (90%)
        run: |
          LINES=$(grep -m1 'Lines' coverage/coverage.md | grep -oP '\d+\.\d+(?=%)' | head -1)
          echo "Line coverage: ${LINES}%"
          awk -v c="$LINES" 'BEGIN { if (c+0 < 90) { print "Coverage below 90%!"; exit 1 } }'

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  slither:
    name: Slither
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          target: "src/"
          slither-args: "--exclude-dependencies --filter-paths lib/"
          fail-on: high
